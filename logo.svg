<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF0080" />
      <stop offset="16%" style="stop-color:#FF8000" />
      <stop offset="33%" style="stop-color:#FFFF00" />
      <stop offset="50%" style="stop-color:#00FF00" />
      <stop offset="66%" style="stop-color:#0080FF" />
      <stop offset="83%" style="stop-color:#4B0082" />
      <stop offset="100%" style="stop-color:#8F00FF" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Rainbow Arc -->
  <path d="M 50 100 Q 200 20 350 100" fill="none" stroke="url(#rainbow)" stroke-width="4" filter="url(#glow)" />
  
  <!-- Sparkles -->
  <circle cx="125" cy="65" r="1.5" fill="white" />
  <circle cx="200" cy="55" r="2" fill="white" />
  <circle cx="255" cy="65" r="1.5" fill="white" />
  <circle cx="290" cy="80" r="1" fill="white" />
  <path d="M 125 60 L 125 70 M 120 65 L 130 65" stroke="white" stroke-width="0.5" />
  <path d="M 255 60 L 255 70 M 250 65 L 260 65" stroke="white" stroke-width="0.5" />

  <!-- Typography: "Speqtrum" -->
  <text x="50%" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-style="italic" font-size="64" fill="white" letter-spacing="-2">
    <tspan fill="#FF0080">S</tspan><tspan fill="#FF4D00">p</tspan><tspan fill="#FFD700">e</tspan><tspan fill="#32CD32">q</tspan><tspan fill="#00BFFF">t</tspan><tspan fill="#1E90FF">r</tspan><tspan fill="#8A2BE2">u</tspan><tspan fill="#4B0082">m</tspan>
  </text>

  <!-- Geometric Icon Below "um" -->
  <g transform="translate(280, 140) scale(0.6)">
    <path d="M 20 0 L 40 20 L 20 40 L 0 20 Z" fill="#4B0082" />
    <path d="M 40 10 L 60 30 L 40 50 L 20 30 Z" fill="#FF8000" opacity="0.9" />
    <path d="M 30 -10 L 50 10 L 30 30 L 10 10 Z" fill="#FF0080" opacity="0.8" />
  </g>
</svg>